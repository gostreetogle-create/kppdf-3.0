# ====================================================================
# KPPDF 3.0 — конфиг для Nginx на Synology DSM
# ====================================================================
# Куда положить:
#   Если DSM 7+:  /etc/nginx/sites-enabled/kppdf.conf
#   Или через:    Control Panel → Application Portal → Reverse Proxy
#
# Если используете Docker-стек (docker-compose.prod.yml), Nginx не нужен —
# backend сам раздаёт frontend на порту 3000.
# Достаточно в Cloudflare указать A-запись на IP Synology.
# ====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name sport-set.ru www.sport-set.ru;

    # Перенаправление HTTP → HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sport-set.ru www.sport-set.ru;

    # SSL — если сертификаты на Synology (Let's Encrypt через DSM)
    ssl_certificate     /usr/synology/etc/certificate/system/default/fullchain.pem;
    ssl_certificate_key /usr/synology/etc/certificate/system/default/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/kppdf-access.log;
    error_log  /var/log/nginx/kppdf-error.log;

    # Статика (Angular frontend)
    root /volume1/web/kppdf-3.0/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — прокси на backend Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
