# KPPDF 3.0 — Production stack (Ubuntu / Synology)
# Запуск: docker compose -f docker-compose.prod.yml up -d
# Остановка: docker compose -f docker-compose.prod.yml down
# Логи:    docker compose -f docker-compose.prod.yml logs -f
#
# Данные на хосте (KPPDF_DATA_DIR в .env):
#   mongodb/  — база данных (bind-mount, переживает обновления)
#   media/    — загруженные файлы (bind-mount)
#
# Код приложения — отдельно в REMOTE_DIR (/opt/kppdf-3.0), перезаписывается при деплое.

services:
  mongodb:
    image: mongo:4.4
    container_name: kppdf-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - ${KPPDF_DATA_DIR}/mongodb:/data/db
    environment:
      MONGO_INITDB_DATABASE: kppdf30
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kppdf-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend:ro
      - ${KPPDF_DATA_DIR}/media:/app/uploads
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://kppdf-mongodb:27017/kppdf30
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required! Set it in .env or shell}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required!}"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://sport-set.ru}"
      PORT: "3000"
      FRONTEND_PATH: /app/frontend/browser
      UPLOAD_PATH: /app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  monitoring:
    build:
      context: ./deploy/monitoring
      dockerfile: Dockerfile
    container_name: kppdf-monitor
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /:/hostroot:ro
    environment:
      HOST_PROC: /host/proc
      HOST_ROOT: /hostroot
      BACKEND_URL: http://localhost:3000
      MONITOR_PORT: "3001"
      REFRESH_INTERVAL: "10"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      DISK_ALERT_THRESHOLD: "90"
      ALERT_CHECK_INTERVAL: "300"
